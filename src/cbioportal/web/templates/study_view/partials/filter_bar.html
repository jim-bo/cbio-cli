<div class="filter-bar" id="active-filter-bar">
    {% if active_filters %}
    <span style="color:#555;margin-right:6px;">Filters:</span>
    {% for f in active_filters %}
        {% for v in f.values %}
        <span class="filter-pill">
            {{ f.attribute.replace('_', ' ') }}: {{ v }}
            <button class="remove-filter"
                    onclick="clearFilter('{{ f.attribute }}', '{{ v }}')"
                    title="Remove filter">&times;</button>
        </span>
        {% endfor %}
    {% endfor %}
    <button class="btn btn-xs btn-link"
            onclick="clearAllFilters()"
            style="color:#d32f2f;padding:0 4px;">Clear All</button>
    {% endif %}
</div>
