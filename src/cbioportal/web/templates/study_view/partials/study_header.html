<div style="padding: 8px 20px 10px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: flex-start; justify-content: space-between; gap: 20px;">

    {# Left: title + description #}
    <div style="flex: 1; min-width: 0;">
        <div style="margin-bottom: 4px;">
            <a href="/study/summary?id={{ meta.study_id }}"
               style="font-size: 16px; font-weight: bold; color: #2986e2; text-decoration: none;">{{ meta.name }}</a>
            <a href="https://datahub.assets.cbioportal.org/{{ meta.study_id }}.tar.gz"
               title="Download study data"
               style="margin-left: 6px; color: #555; font-size: 13px; vertical-align: middle;">
                <i class="fa fa-cloud-download"></i>
            </a>
        </div>
        <div style="font-size: 12.5px; color: #333; line-height: 1.5;">
            {{ meta.description | safe }}{% if meta.pmid %} <a href="https://pubmed.ncbi.nlm.nih.gov/{{ meta.pmid.split(',')[0].strip() }}/" target="_blank">PubMed</a>{% endif %}
        </div>
    </div>

    {# Right: gene query box + button #}
    <div style="flex-shrink: 0; display: flex; align-items: flex-start; gap: 4px; padding-top: 2px;">
        <input type="text"
               id="gene-query-input"
               placeholder="Click gene symbols below or enter here"
               style="width: 310px; height: 28px; padding: 3px 8px; font-size: 12px; border: 1px solid #ccc; border-radius: 3px; line-height: 1.4;">
        <button id="gene-query-btn"
                class="btn btn-primary btn-sm"
                disabled
                onclick="submitGeneQuery()"
                style="height: 28px; padding: 0 12px; font-size: 12px; white-space: nowrap;">
            <i class="fa fa-search"></i>&nbsp; Query
        </button>
    </div>
</div>

<script>
document.getElementById('gene-query-input').addEventListener('input', function() {
    document.getElementById('gene-query-btn').disabled = !this.value.trim();
});
function submitGeneQuery() {
    var genes = document.getElementById('gene-query-input').value.trim();
    if (genes) {
        alert('Gene query: ' + genes + '\n(Results View not yet implemented)');
    }
}
</script>
