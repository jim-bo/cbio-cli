<div class="msk-tabs mainTabs" style="position: relative;">
    <ul class="nav nav-tabs" style="margin: 0; width: 100%; display: flex; align-items: center;">
        <li class="active" style="cursor: pointer; white-space: nowrap;">
            <a href="/study/summary?id={{ study_id }}" class="tabAnchor">Summary</a>
        </li>
        <li style="cursor: pointer; white-space: nowrap;">
            <a href="/study/clinicalData?id={{ study_id }}" class="tabAnchor">Clinical Data</a>
        </li>
        <li style="cursor: pointer; white-space: nowrap;">
            <a href="/study/cnSegments?id={{ study_id }}" class="tabAnchor">CN Segments</a>
        </li>
        <li style="cursor: pointer; white-space: nowrap;">
            <a href="/study/plots?id={{ study_id }}" class="tabAnchor">Plots <strong class="beta-text">Beta!</strong></a>
        </li>

        {# Cohort controls pushed to the right #}
        <li style="margin-left: auto; border: none; background: none; display: flex; align-items: center; gap: 6px; padding: 0 20px 0 0;">
            <span style="font-size: 12px; color: #333; font-weight: 500; white-space: nowrap;">
                Selected: {{ meta.n_patients | default(0) }} patients | {{ meta.n_samples | default(0) }} samples
            </span>
            <button class="btn btn-default btn-xs" title="Select samples" style="padding: 3px 6px;">
                <i class="fa fa-crosshairs"></i>
            </button>
            <button class="btn btn-default btn-xs" title="Bookmark" style="padding: 3px 6px;">
                <i class="fa fa-bookmark-o"></i>
            </button>
            <button class="btn btn-default btn-xs" title="Download" style="padding: 3px 6px;">
                <i class="fa fa-download"></i>
            </button>
            <button class="btn btn-primary btn-xs" disabled style="padding: 3px 10px;">
                Custom Selection <i class="fa fa-caret-down"></i>
            </button>
            <button class="btn btn-primary btn-xs" disabled style="padding: 3px 10px;">
                Charts <i class="fa fa-caret-down"></i>
            </button>
            <button class="btn btn-primary btn-xs" disabled style="padding: 3px 10px;">
                Groups <i class="fa fa-caret-down"></i>
            </button>
            <button class="btn btn-primary btn-xs" disabled style="padding: 3px 6px;">
                <i class="fa fa-plus"></i>
            </button>
        </li>
    </ul>
</div>
