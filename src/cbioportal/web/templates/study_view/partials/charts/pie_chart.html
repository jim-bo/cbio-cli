<div id="chart-{{ chart_id }}"
     class="chart-card"
     hx-post="/study/summary/chart/clinical"
     hx-target="#chart-{{ chart_id }}"
     hx-trigger="filterChanged from:body"
     hx-vals='{"attribute_id": "{{ chart_id }}", "chart_type": "pie"}'
     hx-include="#study-id-input,#filter-json-input">
    <div class="chart-card-header">
        <span>{{ chart_title }}</span>
    </div>
    <div class="chart-card-body" style="display:flex; flex-direction:column; align-items:center;">
        {% if data %}
        <div id="pie-{{ chart_id }}" style="width:180px;height:160px;"></div>
        {# Legend #}
        <div style="width:100%; padding:0 4px;">
            {% for row in data[:8] %}
            <div style="display:flex; align-items:center; gap:4px; cursor:pointer; padding:1px 0;"
                 data-attr-id="{{ chart_id }}"
                 data-value="{{ row.value }}"
                 onclick="toggleClinicalFilter('{{ chart_id }}', '{{ row.value | replace("'", "\\'") }}')">
                <span class="pie-legend-dot pie-legend-{{ loop.index0 }}"
                      style="width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>
                <span style="font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                      title="{{ row.value }}">{{ row.value }}</span>
                <span style="font-size:10px;color:#555;white-space:nowrap;">{{ row.count }}</span>
            </div>
            {% endfor %}
            {% if data | length > 8 %}
            <div style="font-size:10px;color:#999;padding-top:2px;">
                +{{ data | length - 8 }} more
            </div>
            {% endif %}
        </div>

        <script type="application/json" id="pie-{{ chart_id }}-data">{{ data | tojson }}</script>
        <script>
        (function() {
            var el = document.getElementById('pie-{{ chart_id }}');
            var raw = JSON.parse(document.getElementById('pie-{{ chart_id }}-data').textContent);
            if (!el || !raw || !raw.length || typeof Victory === 'undefined') return;
            var colors = ['#2986E2','#DC3912','#FF9900','#109618','#990099','#0099C6',
                          '#DD4477','#66AA00','#B82E2E','#316395','#994499','#22AA99'];
            // Apply colors to legend dots
            raw.slice(0,8).forEach(function(d, i) {
                var dot = document.querySelector('.pie-legend-{{ chart_id }}-' + i);
                // fallback selector
                var dots = el.closest('.chart-card').querySelectorAll('.pie-legend-dot');
                if (dots[i]) dots[i].style.background = colors[i % colors.length];
            });
            var chartData = raw.slice(0, 12).map(function(d) {
                return {x: d.value || 'NA', y: d.count};
            });
            ReactDOM.render(
                React.createElement(Victory.VictoryPie, {
                    data: chartData,
                    width: 180,
                    height: 160,
                    innerRadius: 35,
                    colorScale: colors.slice(0, chartData.length),
                    labels: function() { return ''; },
                    style: {data: {cursor: 'pointer'}},
                    events: [{
                        target: 'data',
                        eventHandlers: {
                            onClick: function(evt, props) {
                                var val = props.datum.x;
                                toggleClinicalFilter('{{ chart_id }}', val);
                            }
                        }
                    }]
                }),
                el
            );
        })();
        </script>
        {% else %}
        <div style="padding: 8px; color: #999; font-size: 11px;">No data</div>
        {% endif %}
    </div>
</div>
