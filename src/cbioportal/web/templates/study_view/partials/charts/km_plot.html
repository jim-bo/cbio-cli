<div id="chart-km-plot"
     class="chart-card"
     hx-post="/study/summary/chart/km"
     hx-target="#chart-km-plot"
     hx-trigger="filterChanged from:body"
     hx-include="#study-id-input,#filter-json-input">
    <div class="chart-card-header">
        <span>Overall Survival</span>
    </div>
    <div class="chart-card-body" style="display:flex;flex-direction:column;align-items:center;">
        {% if km_curve and km_curve | length > 1 %}
        <div id="km-plot-canvas" style="width:185px;height:160px;"></div>
        <script type="application/json" id="km-plot-data">{{ km_curve | tojson }}</script>
        <script>
        (function() {
            var el = document.getElementById('km-plot-canvas');
            var raw = JSON.parse(document.getElementById('km-plot-data').textContent);
            if (!el || !raw || !raw.length || typeof Victory === 'undefined') return;
            var chartData = raw.map(function(d) { return {x: d.time, y: d.survival}; });
            ReactDOM.render(
                React.createElement(Victory.VictoryChart, {
                    width: 185, height: 160,
                    padding: {top: 10, bottom: 30, left: 35, right: 10}
                },
                    React.createElement(Victory.VictoryAxis, {
                        label: 'Months',
                        style: {
                            axisLabel: {fontSize: 8, padding: 20},
                            tickLabels: {fontSize: 8}
                        }
                    }),
                    React.createElement(Victory.VictoryAxis, {
                        dependentAxis: true,
                        label: 'Survival',
                        domain: [0, 1],
                        style: {
                            axisLabel: {fontSize: 8, padding: 24},
                            tickLabels: {fontSize: 8}
                        }
                    }),
                    React.createElement(Victory.VictoryLine, {
                        data: chartData,
                        interpolation: 'stepAfter',
                        style: {data: {stroke: '#2986E2', strokeWidth: 1.5}}
                    })
                ),
                el
            );
        })();
        </script>
        {% else %}
        <div style="padding: 8px; color: #999; font-size: 11px;">No survival data</div>
        {% endif %}
    </div>
</div>
