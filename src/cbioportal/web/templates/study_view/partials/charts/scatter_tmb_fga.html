<div id="chart-scatter-tmb-fga"
     class="chart-card chart-card-wide"
     hx-post="/study/summary/chart/scatter"
     hx-target="#chart-scatter-tmb-fga"
     hx-trigger="filterChanged from:body"
     hx-include="#study-id-input,#filter-json-input">
    <div class="chart-card-header">
        <span>Mutation Count vs Fraction Genome Altered</span>
    </div>
    <div class="chart-card-body" style="display:flex;flex-direction:column;align-items:center;">
        {% if scatter_data %}
        <div id="scatter-tmb-fga-canvas" style="width:390px;height:220px;"></div>
        <script type="application/json" id="scatter-tmb-fga-data">{{ scatter_data | tojson }}</script>
        <script>
        (function() {
            var el = document.getElementById('scatter-tmb-fga-canvas');
            var raw = JSON.parse(document.getElementById('scatter-tmb-fga-data').textContent);
            if (!el || !raw || !raw.length || typeof Victory === 'undefined') return;
            var chartData = raw.map(function(d) {
                return {x: d.fga, y: d.mutation_count};
            });
            ReactDOM.render(
                React.createElement(Victory.VictoryChart, {
                    width: 390, height: 220,
                    padding: {top: 10, bottom: 40, left: 50, right: 10}
                },
                    React.createElement(Victory.VictoryAxis, {
                        label: 'Fraction Genome Altered',
                        style: {
                            axisLabel: {fontSize: 9, padding: 28},
                            tickLabels: {fontSize: 8}
                        }
                    }),
                    React.createElement(Victory.VictoryAxis, {
                        dependentAxis: true,
                        label: 'Mutation Count',
                        scale: 'log',
                        style: {
                            axisLabel: {fontSize: 9, padding: 36},
                            tickLabels: {fontSize: 8}
                        }
                    }),
                    React.createElement(Victory.VictoryScatter, {
                        data: chartData,
                        size: 2,
                        style: {data: {fill: '#2986E2', opacity: 0.5}}
                    })
                ),
                el
            );
        })();
        </script>
        {% else %}
        <div style="padding: 8px; color: #999; font-size: 11px;">No scatter data (requires mutation + FGA data)</div>
        {% endif %}
    </div>
</div>
