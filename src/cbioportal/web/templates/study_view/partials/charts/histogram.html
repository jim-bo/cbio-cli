<div id="chart-age-histogram"
     class="chart-card"
     hx-post="/study/summary/chart/km"
     hx-target="#chart-age-histogram"
     hx-trigger="filterChanged from:body"
     hx-include="#study-id-input,#filter-json-input">
    <div class="chart-card-header">
        <span>Current Age</span>
    </div>
    <div class="chart-card-body" style="display:flex;flex-direction:column;align-items:center;">
        {% if age_histogram %}
        <div id="histogram-age" style="width:185px;height:160px;"></div>
        <script type="application/json" id="histogram-age-data">{{ age_histogram | tojson }}</script>
        <script>
        (function() {
            var el = document.getElementById('histogram-age');
            var raw = JSON.parse(document.getElementById('histogram-age-data').textContent);
            if (!el || !raw || !raw.length || typeof Victory === 'undefined') return;
            var chartData = raw.map(function(d) { return {x: d.bin, y: d.count}; });
            ReactDOM.render(
                React.createElement(Victory.VictoryChart, {
                    width: 185, height: 160,
                    domainPadding: {x: 6},
                    padding: {top: 10, bottom: 30, left: 30, right: 10}
                },
                    React.createElement(Victory.VictoryAxis, {
                        style: {
                            tickLabels: {fontSize: 7, angle: -30, textAnchor: 'end'}
                        }
                    }),
                    React.createElement(Victory.VictoryAxis, {
                        dependentAxis: true,
                        style: {tickLabels: {fontSize: 8}}
                    }),
                    React.createElement(Victory.VictoryBar, {
                        data: chartData,
                        style: {data: {fill: '#2986E2', cursor: 'pointer'}},
                        barRatio: 0.8
                    })
                ),
                el
            );
        })();
        </script>
        {% else %}
        <div style="padding: 8px; color: #999; font-size: 11px;">No age data</div>
        {% endif %}
    </div>
</div>
