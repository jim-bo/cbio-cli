<div id="chart-{{ chart_id }}"
     class="chart-card"
     hx-post="/study/summary/chart/clinical"
     hx-target="#chart-{{ chart_id }}"
     hx-trigger="filterChanged from:body"
     hx-vals='{"attribute_id": "{{ chart_id }}", "chart_type": "table"}'
     hx-include="#study-id-input,#filter-json-input">
    <div class="chart-card-header">
        <span>{{ chart_title }}</span>
    </div>
    <div class="chart-card-body">
        {% if data %}
        <table class="chart-table">
            <tbody>
            {% for row in data[:20] %}
            <tr data-attr-id="{{ chart_id }}"
                data-value="{{ row.value }}"
                onclick="toggleClinicalFilter('{{ chart_id }}', '{{ row.value | replace("'", "\\'") }}')">
                <td style="max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                    title="{{ row.value }}">{{ row.value }}</td>
                <td style="text-align: right; width: 36px; color: #555;">{{ row.count }}</td>
                <td class="freq-bar-wrap">
                    <div class="freq-bar-bg">
                        <div class="freq-bar-fill" style="width: {{ row.pct }}%;"></div>
                    </div>
                </td>
                <td style="text-align: right; width: 36px; color: #999; font-size: 10px;">{{ row.pct }}%</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
        {% if data | length > 20 %}
        <div style="padding: 2px 4px; color: #999; font-size: 10px;">
            Showing 20 of {{ data | length }} values
        </div>
        {% endif %}
        {% else %}
        <div style="padding: 8px; color: #999; font-size: 11px;">No data</div>
        {% endif %}
    </div>
</div>
